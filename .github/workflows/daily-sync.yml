name: Daily WMS stock-location sync

on:
  schedule:
    - cron: '0 0 * * *'      # 00:00 UTC = 07:00 giờ Việt Nam
  workflow_dispatch: {}       # cho phép chạy tay để test

concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài dependencies (kèm Chromium cho Puppeteer)
        working-directory: sync
        run: npm install

      - name: Chạy đồng bộ
        working-directory: sync
        env:
          WMS_USERNAME: ${{ secrets.WMS_USERNAME }}
          WMS_PASSWORD: ${{ secrets.WMS_PASSWORD }}
          WMS_2FA_SECRET: ${{ secrets.WMS_2FA_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: '1eY_oo9fAvWCTXp24x-Z0FXq9mp_jJPlTHg09qdemETs'
        run: node sync.mjs

      - name: Lưu ảnh lỗi đăng nhập (nếu có)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-error
          path: sync/login-error.png
          if-no-files-found: ignore
